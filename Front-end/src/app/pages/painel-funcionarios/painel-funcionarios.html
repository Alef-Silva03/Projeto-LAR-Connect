<article class="container-fluid painel-funcionarios-container">
    <div class="glass-container shadow-lg animate__animated animate__fadeIn">
        <header class="header-admin d-flex justify-content-between align-items-baseline mb-3">
            <div class="col-12 col-lg-6">
                <span class="badge-admin">PAINEL ADMINISTRATIVO</span>
                <h1 class="text-gradient">GERENCIAMENTO DE FUNCIONÁRIOS</h1>
            </div>

            <section class="card-body glass-card shadow-sm p-4">
            <form (ngSubmit)="onSubmit()" #funcionarioForm="ngForm">
            <h3 class="text-gradient m-3 mb-4">Adicionar Novo Funcionário</h3>
            <div>
                <label for="emailFuncionario" class="form-label-custom">E-mail do Funcionário:</label>
                <input type="email" id="emailFuncionario" name="emailFuncionario" class="form-input-pill" [(ngModel)]="formData.emailFuncionario" required>
            </div>
            <div>
                <label for="cargoFuncionario" class="form-label-custom mt-3">Cargo:</label>
                <input type="text" id="cargoFuncionario" name="cargoFuncionario" class="form-input-pill" [(ngModel)]="formData.cargoFuncionario" required>
            </div>
            <button type="submit" [disabled]="funcionarioForm.invalid" class="btn-enviar-neon mt-4">Adicionar</button>
            </form>
            </section>
            </header>
        <br>


        <section id="tabela-glass" class="custom-scrollbar-table">
                <table id="tabela" class="table-modern">
                <thead>
                    <tr>
                    <th>Nome</th>
                    <th>Cargo</th>
                    <th>E-mail</th>
                    <th>Remover</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let funcionario of funcionarios" class="row-hover">
                        @if (funcionario.cargo != ''){
                            <td class="nome-funcionario">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="avatar-mini">{{ funcionario.nome.charAt(0) }}</div>
                                    <span>{{ funcionario.nome }}</span>
                                </div>
                            </td>
                            <td><span class="badge-pill-dark">{{ funcionario.cargo }}</span></td>
                            <td class="text-secondary-light">{{ funcionario.email }}</td>
                            <td class="text-center">
                                <button type="submit" (click)="removerFuncionario(funcionario.email)" class="btn-action-icon" title="Remover">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        }
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
</article>

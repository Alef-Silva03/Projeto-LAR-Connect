<article class="container-fluid cadastro-container">
    <div class="glass-form-card shadow-lg animate__animated animate__fadeIn">
        <header class="text-center mb-5">
            <span class="badge-step">CONFIGURAÇÃO INICIAL</span>
            <h1 class="text-gradient">CADASTRE SEU CONDOMÍNIO PARA COMEÇAR A USAR A PLATAFORMA!</h1>
        </header>

        <form (ngSubmit)="salvarCondominio()">
            <div class="mb-4">
                <label class="label-neon">Nome do Condomínio</label>
                <div class="pill-input-group">
                    <i class="bi bi-building-fill ms-3 text-cyan"></i>
                    <input type="text" name="nomeCondominio" [(ngModel)]="condominio.nomeCondominio" 
                           placeholder="Ex: Residencial Blue Horizon" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="label-neon">CEP</label>
                <div class="pill-input-group">
                    <i class="bi bi-geo-alt-fill ms-3 text-cyan"></i>
                    <input type="text" 
                           name="cep" 
                           [(ngModel)]="condominio.cep"  
                           placeholder="Ex.: 11111-111" 
                           id="cep" 
                           maxlength="9"
                           (input)="aplicarMascaraCep($event)"
                           (blur)="buscarCep(condominio.cep)" 
                           required>
                </div>
                <!-- Indicador de busca (opcional) -->
                <small *ngIf="buscandoCep" class="text-info">
                    <i class="bi bi-arrow-repeat spin me-1"></i>Buscando endereço...
                </small>
            </div>

            <div class="mb-4">
                <label class="label-neon">País</label>
                <div class="pill-input-group">
                    <i class="bi bi-geo-alt-fill ms-3 text-cyan"></i>
                    <input type="text" name="pais" [(ngModel)]="condominio.pais" 
                           placeholder="Ex: Brasil" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="label-neon">Estado</label>
                <div class="pill-input-group">
                    <i class="bi bi-geo-alt-fill ms-3 text-cyan"></i>
                    <input type="text" name="estado" [(ngModel)]="condominio.estado" 
                           placeholder="Ex: RJ" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="label-neon">Cidade</label>
                <div class="pill-input-group">
                    <i class="bi bi-geo-alt-fill ms-3 text-cyan"></i>
                    <input type="text" name="cidade" [(ngModel)]="condominio.cidade" 
                           placeholder="Ex: Rio de Janeiro" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="label-neon">Logradouro</label>
                <div class="pill-input-group">
                    <i class="bi bi-geo-alt-fill ms-3 text-cyan"></i>
                    <input type="text" name="logradouro" [(ngModel)]="condominio.logradouro" 
                           placeholder="Ex: Rua Benjamin Constant" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="label-neon">Número</label>
                <div class="pill-input-group">
                    <i class="bi bi-geo-alt-fill ms-3 text-cyan"></i>
                    <input type="number" name="numeroCondominio" [(ngModel)]="condominio.numeroCondominio" 
                           placeholder="Ex: 35" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="label-neon">Quantidade de Blocos (se não se aplicar, 0)</label>
                <div class="pill-input-group">
                    <i class="bi bi-geo-alt-fill ms-3 text-cyan"></i>
                    <input type="number" name="blocos" [(ngModel)]="condominio.blocos" 
                           placeholder="Ex: 4" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="label-neon">Quantidade de Apartamentos/Casas</label>
                <div class="pill-input-group">
                    <i class="bi bi-geo-alt-fill ms-3 text-cyan"></i>
                    <input type="number" name="Apartamentos" [(ngModel)]="condominio.apartamentos" 
                           placeholder="Ex: 50" required>
                </div>
            </div>

            <br>
            <div class="text-center">
                <button type="submit" class="btn-neon-large" [disabled]="buscandoCep">
                    <i class="bi bi-check-circle-fill me-2"></i> FINALIZAR E CRIAR
                </button>
            </div>
        </form>
    </div>
</article>

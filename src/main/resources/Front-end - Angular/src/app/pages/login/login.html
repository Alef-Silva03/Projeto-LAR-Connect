<div class="container-fluid" id="login">
    <div id="fundo" class="d-flex flex-column align-items-center justify-content-center min-vh-100">
    <div class="login-box p-4 mt-5 shadow-lg animate__animated animate__fadeIn">
        <form>
            
            <figure class="text-center mb-4">
                <img src="assets/imagem/LogoSemNome.png" alt="LAR Connect" class="logo img-fluid">
                <h2 class="text-white h5 mt-2">Acesse o Sistema</h2>
            </figure>

            <div class="input-group-custom mb-3">
                <i class="bi bi-person-fill text-cyan" style="margin-right: 5px"></i>
                <input type="email" name="login" [(ngModel)]="dadosLogin.login" 
                       placeholder="  E-mail" class="form-control-custom" style="color:black" required>
            </div>

            <div class="input-group-custom mb-4">
                <i class="bi bi-lock-fill text-cyan" style="margin-right: 5px"></i>
                <input type="password" name="senha" [(ngModel)]="dadosLogin.senha" 
                       placeholder="  Senha" class="form-control-custom" required>
            </div>

            <div class="text-center">
                <button (click)="fazerLogin()" class="btn-entrar">ENTRAR</button>
            </div>

            <div class="text-center">
                <button class="btn-entrar">ESQUECI MINHA SENHA</button>
            </div>
            
            <div class="text-center">
                <button routerLink="/cadastro" class="btn-link-cadastro">NÃO TEM CONTA?<span class="text-cyan m-0 p-1">CADASTRE-SE!</span></button>
            </div>

        </form>


    </div>
</div>

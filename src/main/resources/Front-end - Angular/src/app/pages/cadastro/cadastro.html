<div class="container-fluid" id="cadastro">
    <div id="fundo" class="py-5">
        <figure class="text-center">
            <img src="assets/imagem/LogoSemNome.png" alt="LAR Connect" class="logo img-fluid">
        </figure>
        
        <form id="cadastroForm" class="container mt-4" (ngSubmit)="realizarCadastro()">
            <div class="row justify-content-center g-3">
                
                <!-- Perfil -->
                <div class="col-12 col-xl-5 input-group-custom" style="height: 40px">
                    <select name="perfil" [(ngModel)]="usuario.perfil" id="cadPerfil" class="form-select custom-select" required>
                        <option value="" disabled selected hidden>Selecione seu perfil</option>
                        <option value="PROPRIETARIO">Proprietário</option>
                        <option value="INQUILINO">Inquilino</option>
                        <option value="SINDICO">Síndico</option>
                        <option value="FUNCIONARIO">Funcionário</option>
                    </select>
                </div>

                <!-- Nome -->
                <div class="col-12 col-xl-5 input-group-custom">
                    <span class="icon-at"><i class="bi bi-person fs-4 m-2"></i></span>
                    <input type="text" name="nome" [(ngModel)]="usuario.nome" placeholder="Nome" class="form-control-custom" required>
                </div>

                <!-- Email -->
                <div class="col-12 col-xl-5 input-group-custom">
                    <span class="icon-at"><i class="bi bi-at fs-4 m-2"></i></span>
                    <input type="email" name="email" [(ngModel)]="usuario.email" placeholder="Email" class="form-control-custom" required>
                </div>

                <!-- Senha -->
                <div class="col-12 col-xl-5 input-group-custom">
                    <span class="icon-at"><i class="bi bi-lock fs-4 m-2"></i></span>
                    <input type="password" name="senha" [(ngModel)]="usuario.senha" placeholder="Senha" class="form-control-custom" required>
                </div>

                <!-- CPF -->
                <div class="col-12 col-xl-5 input-group-custom">
                    <span class="icon-at"><i class="bi bi-card-text fs-4 m-2"></i></span>
                    <input type="text" name="cpf" [(ngModel)]="usuario.cpf" placeholder="CPF (apenas números)" class="form-control-custom" required>
                </div>

                <!-- Telefone -->
                <div class="col-12 col-xl-5 input-group-custom">
                    <span class="icon-at"><i class="bi bi-telephone fs-4 m-2"></i></span>
                    <input type="text" name="telefone" [(ngModel)]="usuario.telefone" placeholder="Telefone" class="form-control-custom" required>
                </div>
            </div>

            <div class="text-center mt-3 row">
                <button type="submit" class="btn-link style-none" style="text-decoration:none">CADASTRE-SE</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <button routerLink="/login" class="btn-link" style="text-decoration:none">JÁ TENHO CONTA (LOGIN)</button>
        </div>
    </div>
</div>

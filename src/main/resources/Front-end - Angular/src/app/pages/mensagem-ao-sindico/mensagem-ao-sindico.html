<article class="enviar-comunicados-container">
  <div class="glass-card shadow-lg p-5">
    <header class="text-center mb-5">
      <h1 class="text-gradient display-5 fw-bold">ENVIE MENSAGENS ANÔNIMAS AO SÍNDICO</h1>
      <p class="subtitulo">Envie sugestões, dúvidas e queixas ao síndico do seu condomínio de forma totalmente anônima</p>
    </header>

        <form (ngSubmit)="enviarMensagemAoSindico()" #mensagemPrivadaForm="ngForm" class="form-comunicado">
        <div class="mb-4">
            <label class="form-label-custom">Tema da Mensagem</label>
            <select name="assunto" [(ngModel)]="mensagemPrivada.assunto" class="form-select-pill" required>
            <option value="" disabled selected>Escolha uma opção</option>
            <option value="Sugestão">Sugestão</option>
            <option value="Dúvida">Dúvida</option>
            <option value="Queixa">Queixa</option>
            <option value="Outros">Outros</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label-custom">Título da Mensagem</label>

            <input type="text" name="titulo" [(ngModel)]="mensagemPrivada.titulo"
                class="form-input-pill" placeholder="Escreva o título da sua mensagem" required>
        </div>

        <div class="mb-5">
            <label class="form-label-custom">Texto da Mensagem</label>
            <textarea name="texto" [(ngModel)]="mensagemPrivada.texto" rows="5"
                    class="form-textarea-pill" placeholder="Escreva aqui os detalhes para os moradores..." required></textarea>
        </div>

        <div class="text-center">
            <button type="submit" class="btn-enviar-neon" [disabled]="mensagemPrivadaForm.invalid">
            <i class="bi bi-send-fill me-2"></i> ENVIAR MENSAGEM
            </button>
        </div>
        <br>
        </form>
    </div>
</article>

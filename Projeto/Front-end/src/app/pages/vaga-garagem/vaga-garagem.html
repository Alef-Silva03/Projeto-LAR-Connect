<article class="painel-e-vagas">
    <div class="container-fluid glass-container">
        <header class="text-center mb-5">
            <h1 class="text-gradient">VAGAS</h1>
        </header>

        <!-- Loading State -->
        <div *ngIf="loading" class="text-center my-5">
            <div class="spinner-border text-info" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
        </div>

        <!-- Error State -->
        <div *ngIf="error" class="alert alert-danger text-center my-5" role="alert">
            {{ error }}
        </div>

        <!-- Filters -->
        <div class="filter-pills d-flex justify-content-center gap-3 mb-5" *ngIf="!loading">
            <button 
                class="filter-item" 
                [class.active]="filtroAtivo === 'Todas'" 
                (click)="filtrarVagas('Todas')">
                Todas
            </button>
            <button 
                class="filter-item" 
                [class.active]="filtroAtivo === 'Disponíveis para Venda'" 
                (click)="filtrarVagas('Disponíveis para Venda')">
                Disponíveis para Venda
            </button>
        </div>

        <!-- Vagas Table -->
        <div id="bloco" class="shadow-lg" *ngIf="!loading && vagas.length > 0">
            <section id="tabela-comercial">
                <table>
                    <thead>
                        <tr>
                            <th>LOCALIZAÇÃO</th>
                            <th>VALOR</th>
                            <th>STATUS</th>
                            <th class="text-center">AÇÃO</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let vaga of vagas">
                            <td>
                                <span class="vaga-id">VAGA {{ vaga.localizacao || vaga.numero }}</span>
                                <small class="d-block text-muted" *ngIf="vaga.proprietario">
                                    Proprietário: {{ vaga.proprietario }}
                                </small>
                            </td>
                            <td class="valor">{{ formatarValor(vaga) }}</td>
                            <td>
                                <span class="status-indicator" [class]="getStatusClass(vaga.status)">
                                    {{ getStatusText(vaga.status) }}
                                </span>
                            </td>
                            <td class="text-center">
                                <button 
                                    class="btn-acao-neon" 
                                    [class.btn-reservada]="vaga.status === 'reservada'"
                                    [class.btn-vendida]="vaga.status === 'vendida'"
                                    [class.btn-indisponivel]="vaga.status === 'indisponivel'"
                                    [disabled]="!isBotaoHabilitado(vaga)"
                                    (click)="acaoBotao(vaga)">
                                    {{ getBotaoTexto(vaga) }}
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>

        <!-- No Results -->
        <div *ngIf="!loading && vagas.length === 0" class="text-center my-5">
            <p class="text-muted">Nenhuma vaga encontrada.</p>
        </div>
    </div>
</article>
